<svg xmlns="http://www.w3.org/2000/svg" width="960" height="250" aria-labelledby="title desc" role="img" viewBox="0 0 960 250"><title id="title">Hermes session recap panel</title><desc id="desc">Stylized panel showing the previous conversation summary displayed when resuming a session.</desc><rect width="960" height="250" fill="#07070d" rx="18"/><rect width="912" height="202" x="24" y="24" fill="#0a0a12" stroke="#3a3217" rx="16"/><text x="480" y="56" fill="gold" font-family="Inter, sans-serif" font-size="20" font-weight="600" text-anchor="middle">Previous Conversation</text><line x1="48" x2="912" y1="72" y2="72" stroke="#2b2410"/><text x="64" y="106" fill="#fd6" font-family="JetBrains Mono, monospace" font-size="15">● You: What is Python?</text><text x="64" y="136" fill="#7ce38b" font-family="JetBrains Mono, monospace" font-size="15">◆ Hermes: Python is a high-level programming language.</text><text x="64" y="166" fill="#fd6" font-family="JetBrains Mono, monospace" font-size="15">● You: How do I install it?</text><text x="64" y="196" fill="#7ce38b" font-family="JetBrains Mono, monospace" font-size="15">◆ Hermes: [3 tool calls: web_search, web_extract, terminal]</text></svg>